name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: offsetcalc-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: offsetcalc-api/package-lock.json
      - run: npm ci
      - run: npm test -- --coverage
      - run: npm run build

  test-ui:
    name: UI Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: offsetcalc-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: offsetcalc-ui/package-lock.json
      - run: npm ci
      - run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-api, test-ui]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: offsetcalc-ui/package-lock.json
      - name: Build frontend
        run: npm ci && npm run build
        working-directory: offsetcalc-ui
      - name: Build API image
        run: docker build -t offsetcalc-api:${{ github.sha }} ./offsetcalc-api
      - name: Build UI image
        run: docker build -t offsetcalc-ui:${{ github.sha }} ./offsetcalc-ui
